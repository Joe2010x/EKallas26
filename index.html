<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E's Birthday Party 🎉</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 15%, #ffecd2 28%,
        #a1c4fd 42%, #c2e9fb 55%, #d4fc79 68%, #96e6a1 80%, #fddb92 100%);
      background-size: 400% 400%;
      animation: bgShift 10s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    @keyframes bgShift {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }

    /* ===== Confetti Canvas ===== */
    #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }

    /* ===== Card ===== */
    .card {
      position: relative; z-index: 1;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* ===== Hero Banner ===== */
    .hero {
      background: linear-gradient(160deg, #f953c6 0%, #b91d73 25%, #4776E6 60%, #8E54E9 100%);
      padding: 40px 30px 36px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15) 0%, transparent 60%),
                  radial-gradient(circle at 80% 80%, rgba(255,255,255,0.10) 0%, transparent 50%);
    }

    .balloons {
      font-size: 2rem;
      letter-spacing: 6px;
      animation: float 3s ease-in-out infinite;
      display: block;
      margin-bottom: 8px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .hero-title {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 900;
      letter-spacing: 2px;
      position: relative;
      background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #c77dff, #ff6b6b);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.35));
      animation: rainbowShift 4s linear infinite;
    }

    @keyframes rainbowShift {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    /* Keep "Emma" slightly larger */
    .hero-title .name {
      font-size: 1.2em;
    }

    .hero-sub {
      margin-top: 8px;
      color: rgba(255,255,255,0.9);
      font-size: 1.05rem;
      font-weight: 600;
      position: relative;
    }

    .hero-sub .age {
      display: inline-block;
      font-size: 2.4em;
      font-weight: 900;
      line-height: 1;
      vertical-align: middle;
      color: #fff;
      -webkit-text-stroke: 2.5px #ffd93d;
      paint-order: stroke fill;
      text-shadow:
        0 0 12px #ffd93d,
        0 0 28px #ff6b6b,
        0 3px 6px rgba(0,0,0,0.6);
      animation: agePulse 2s ease-in-out infinite;
    }

    @keyframes agePulse {
      0%, 100% { transform: scale(1) rotate(-4deg); }
      50%       { transform: scale(1.18) rotate(4deg); }
    }

    /* ===== Info Section ===== */
    .info {
      padding: 28px 28px 0;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff5f9, #ffe8f4);
      border: 1.5px solid rgba(249, 83, 198, 0.15);
    }

    .info-icon {
      font-size: 1.8rem;
      flex-shrink: 0;
      width: 44px; text-align: center;
    }

    .info-text {
      display: flex;
      flex-direction: column;
    }

    .info-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #b91d73;
      font-weight: 700;
    }

    .info-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: #2d2d2d;
      margin-top: 2px;
    }

    /* ===== Divider ===== */
    .divider {
      margin: 24px 28px;
      border: none;
      border-top: 2px dashed rgba(200,100,200,0.25);
    }

    /* ===== RSVP Form ===== */
    .rsvp {
      padding: 0 28px 36px;
    }

    .rsvp-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 800;
      color: #7b2ff7;
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e0c8f5;
      border-radius: 12px;
      font-size: 1rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fefefe;
    }

    .form-group input:focus {
      border-color: #b91d73;
      box-shadow: 0 0 0 4px rgba(185,29,115,0.1);
    }

    .btn-confirm {
      width: 100%;
      padding: 16px;
      margin-top: 8px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #f953c6, #b91d73);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 6px 20px rgba(185,29,115,0.35);
    }

    .btn-confirm:hover  { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(185,29,115,0.45); }
    .btn-confirm:active { transform: translateY(0);    box-shadow: 0 4px 12px rgba(185,29,115,0.3); }
    .btn-confirm:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ===== Messages ===== */
    .msg {
      display: none;
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      text-align: center;
    }
    .msg.success { background: #e8fdf0; color: #1a7f4b; border: 1.5px solid #a3e4b8; display: block; }
    .msg.error   { background: #fff0f0; color: #c0392b; border: 1.5px solid #f5c6c6; display: block; }

    /* ===== Language Switcher ===== */
    .lang-bar {
      position: relative; z-index: 2;
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 6px 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
    }
    .lang-btn {
      border: none;
      background: transparent;
      padding: 6px 16px;
      border-radius: 30px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      color: #7b2ff7;
      transition: background 0.18s, color 0.18s;
      letter-spacing: 0.5px;
    }
    .lang-btn:hover  { background: rgba(185,29,115,0.10); }
    .lang-btn.active { background: linear-gradient(135deg, #f953c6, #b91d73); color: #fff; }

    /* ===== Footer note ===== */
    .footer-note {
      margin-top: 18px;
      font-size: 0.95rem;
      font-weight: 600;
      color: rgba(100,30,100,0.65);
      text-align: center;
      padding: 0 4px 8px;
    }
  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<!-- Language Switcher -->
<div class="lang-bar" role="group" aria-label="Language">
  <button class="lang-btn active" data-lang="en">🇬🇧 English</button>
  <button class="lang-btn" data-lang="sv">🇸🇪 Svenska</button>
  <button class="lang-btn" data-lang="zh">🇨🇳 中文</button>
</div>

<div class="card">
  <!-- ===== Hero Banner ===== -->
  <div class="hero">
    <span class="balloons">🎈🎂🎈</span>
    <h1 class="hero-title"><span class="name">Emma</span><span data-i18n="hero_title"></span></h1>
    <p class="hero-sub" data-i18n="hero_sub"></p>
  </div>

  <!-- ===== Party Info ===== -->
  <div class="info">
    <div class="info-item">
      <span class="info-icon">📅</span>
      <div class="info-text">
        <span class="info-label" data-i18n="label_date"></span>
        <span class="info-value" data-i18n="value_date"></span>
      </div>
    </div>
    <div class="info-item">
      <span class="info-icon">🕐</span>
      <div class="info-text">
        <span class="info-label" data-i18n="label_time"></span>
        <span class="info-value" data-i18n="value_time"></span>
      </div>
    </div>
    <div class="info-item">
      <span class="info-icon">📍</span>
      <div class="info-text">
        <span class="info-label" data-i18n="label_venue"></span>
        <span class="info-value">Marknadsvägen 127</span>
      </div>
    </div>
  </div>

  <hr class="divider" />f

  <!-- ===== RSVP Form ===== -->
  <div class="rsvp">
    <p class="rsvp-title" data-i18n="rsvp_title"></p>

    <!--
      ====================================================
      FORMSPREE setup (author):
      1. Go to https://formspree.io and sign in with j22se@hotmail.com
      2. Create a new Form and copy your Form ID (format: xxxxxxxx)
      3. Replace YOUR_FORM_ID below with that ID
         e.g.  action="https://formspree.io/f/abcdefgh"
      ====================================================
    -->
    <form id="rsvpForm" action="https://formspree.io/f/mkopykye" method="POST">
      <input type="hidden" name="_subject" value="🎂 E's Birthday Party — New RSVP!" />

      <div class="form-group">
        <label for="guestName" data-i18n="label_name"></label>
        <input
          type="text"
          id="guestName"
          name="name"
          data-i18n-placeholder="placeholder_name"
          required
          autocomplete="name"
          maxlength="60"
        />
      </div>

      <div class="form-group">
        <label for="guestCount" data-i18n="label_count"></label>
        <input
          type="number"
          id="guestCount"
          name="guests"
          placeholder="1"
          min="1"
          max="10"
          value="1"
        />
      </div>

      <div class="form-group">
        <label for="allergy" data-i18n="label_allergy"></label>
        <input
          type="text"
          id="allergy"
          name="allergy"
          data-i18n-placeholder="placeholder_allergy"
          maxlength="200"
        />
      </div>

      <button type="submit" class="btn-confirm" id="submitBtn" data-i18n="btn_confirm"></button>

      <p class="footer-note" data-i18n="footer_note"></p>

      <div id="successMsg" class="msg" data-i18n="msg_success"></div>
      <div id="errorMsg"   class="msg" data-i18n="msg_error"></div>
    </form>
  </div>
</div>

<!-- ===== Confetti Script ===== -->
<script>
  (function () {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    const COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#f953c6','#c77dff','#ff9a3c'];
    let pieces = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function spawn(n) {
      for (let i = 0; i < n; i++) {
        pieces.push({
          x:     Math.random() * canvas.width,
          y:     Math.random() * canvas.height - canvas.height,
          w:     6 + Math.random() * 8,
          h:     10 + Math.random() * 6,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          rot:   Math.random() * Math.PI * 2,
          rotV:  (Math.random() - 0.5) * 0.08,
          vy:    1.5 + Math.random() * 2.5,
          vx:    (Math.random() - 0.5) * 1.2,
          opacity: 0.7 + Math.random() * 0.3,
          shape:  Math.random() < 0.5 ? 'rect' : 'circle'
        });
      }
    }

    spawn(90);

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.opacity;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        }
        ctx.restore();

        p.y   += p.vy;
        p.x   += p.vx;
        p.rot += p.rotV;

        if (p.y > canvas.height + 20) {
          p.y = -20;
          p.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

      btn.classList.toggle('active', btn.dataset.lang === lang);

  // Wire up buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {

  });

<!-- ===== Formspree AJAX Submit ===== -->
<script>
  const form       = document.getElementById('rsvpForm');
  const submitBtn  = document.getElementById('submitBtn');
  const successMsg = document.getElementById('successMsg');
  const errorMsg   = document.getElementById('errorMsg');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const t      = TRANSLATIONS[currentLang];
    const action = form.action;

    if (action.includes('YOUR_FORM_ID')) {
      const name    = document.getElementById('guestName').value;
      const count   = document.getElementById('guestCount').value;
      const allergy = document.getElementById('allergy').value || '—';
      const body    = t.mail_body.replace('{name}', name).replace('{count}', count).replace('{allergy}', allergy);
      window.location.href =
        'mailto:j22se@hotmail.com?subject=' + encodeURIComponent(t.mail_subject) +
        '&body=' + encodeURIComponent(body);
      successMsg.style.display = 'block';
      errorMsg.style.display   = 'none';
      submitBtn.disabled       = true;
      submitBtn.textContent    = t.btn_done;
      return;
    }

    submitBtn.disabled    = true;
    submitBtn.textContent = t.btn_sending;
    successMsg.style.display = 'none';
    errorMsg.style.display   = 'none';

    try {
      const data = new FormData(form);
      const res  = await fetch(action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        successMsg.style.display = 'block';
        submitBtn.textContent    = t.btn_done;
        form.reset();
        window.dispatchEvent(new Event('rsvpSuccess'));
      } else {
        throw new Error('Server error');
      }
    } catch (_) {
      errorMsg.style.display = 'block';
      submitBtn.disabled     = false;
      submitBtn.textContent  = t.btn_confirm;
    }
  });
</script>
